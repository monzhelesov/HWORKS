apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-init
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-init
  template:
    metadata:
      labels:
        app: nginx-init
    spec:
      initContainers:
        - name: wait-for-service
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nslookup svc-nginx-init.default.svc.cluster.local; do
                echo "Waiting for svc-nginx-init..."
                sleep 2
              done
              echo "Service found!"
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80